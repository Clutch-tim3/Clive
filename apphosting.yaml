runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # ── Non-sensitive: safe to store here ────────────────────────────────────────
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: clive-6d22e
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@clive-6d22e.iam.gserviceaccount.com
    availability:
      - RUNTIME

  # ── Sensitive: stored in Google Secret Manager ────────────────────────────────
  # Run this command once to create the secret:
  # firebase apphosting:secrets:set FIREBASE_ADMIN_PRIVATE_KEY
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME

  # ── Name.com Domain Registrar ────────────────────────────────────────────────
  # Username is not sensitive — stored inline
  - variable: NAMECOM_USERNAME
    value: thabangmolwantwa0@gmail.com
    availability:
      - RUNTIME

  # Token is sensitive — stored in Secret Manager
  # Run once: firebase apphosting:secrets:set NAMECOM_API_TOKEN
  - variable: NAMECOM_API_TOKEN
    secret: NAMECOM_API_TOKEN
    availability:
      - RUNTIME

  - variable: NAMECOM_ENV
    value: production
    availability:
      - RUNTIME

  # ── Firebase client SDK (public — required at BUILD for Next.js bundling) ─────
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCGcS2ul2a3lYXk_4lryQVt-5mfUdB3sJY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: clive-6d22e.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: clive-6d22e
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: clive-6d22e.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: 969322320874
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:969322320874:web:03c2412cc87e6a2c035893
    availability:
      - BUILD
      - RUNTIME

  # ── Public app URL ────────────────────────────────────────────────────────────
  - variable: NEXT_PUBLIC_APP_URL
    value: https://clive--clive-6d22e.us-east4.hosted.app
    availability:
      - BUILD
      - RUNTIME
